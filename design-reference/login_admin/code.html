<body class="bg-surface font-body-md text-body-md antialiased text-on-surface">
<div class="min-h-screen flex w-full">
<!-- Left Panel: Branding & Pattern (Hidden on Mobile) -->
<div class="hidden lg:flex w-1/2 bg-dark-bg relative items-center justify-center overflow-hidden">
<!-- Background Image Overlay -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-50 mix-blend-overlay" data-alt="A moody, luxurious close-up photography of dark purple and magenta orchids and roses, set against a deep obsidian background. The lighting is dramatic and cinematic, highlighting the velvety textures and delicate water droplets on the petals. The overarching aesthetic is elegant, premium, and sophisticated, matching a high-end artisanal flower boutique's dark mode branding. Soft, ambient shadows create depth, emphasizing the rich #1E1040 and #E9D5FF color palette." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDoffiX4uNsy6_vNpwCj01F3U-zP8zho6TH1fAr65wqEjiCj9DVuK_CIu8Pnt9WK9ee3BrzdpMTLOqkjFFuyhc28i9BVy2SGj7gNE14I0CkjTSRm5jzFZfEJ1ZNapWYZnJm9ag_1xxIIt7BMju6r0LMJKs5p5-42ilVOCbmGaMjcZd0TLIIcfkNRyafugOqfxRjTLKF_QmDLukGuUxdXNJGitYFtRRJDdSpNIRCVnLJE6PCAUx5InJt"/>
<!-- Gradient to ensure text readability -->
<div class="absolute inset-0 bg-gradient-to-t from-dark-bg via-dark-bg/80 to-transparent"></div>
</div>
<!-- Branding Content -->
<div class="relative z-10 text-center px-12 flex flex-col items-center">
<div class="w-24 h-24 bg-surface-container-lowest/10 backdrop-blur-md rounded-full border border-white/20 flex items-center justify-center mb-8 shadow-[0_8px_32px_rgba(107,33,168,0.3)]">
<span class="material-symbols-outlined text-primary-fixed text-5xl" style="font-variation-settings: 'FILL' 1;">local_florist</span>
</div>
<h1 class="font-display text-display text-dark-text mb-6 drop-shadow-lg">WanFlorist</h1>
<div class="h-1 w-16 bg-primary-fixed/50 rounded-full mb-6"></div>
<p class="font-body-lg text-body-lg text-primary-fixed-dim max-w-md leading-relaxed">
                    Sistem Manajemen Butik Bunga. Kelola pesanan, inventaris, dan pelanggan dengan elegan dan efisien.
                </p>
</div>
</div>
<!-- Right Panel: Login Form -->
<div class="w-full lg:w-1/2 flex items-center justify-center bg-surface-container-lowest p-8 sm:p-12 lg:p-24 relative">
<!-- Mobile Logo -->
<div class="absolute top-8 left-8 lg:hidden flex items-center gap-space-2">
<div class="w-10 h-10 bg-primary-subtle rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">local_florist</span>
</div>
<span class="font-headline-md text-headline-md text-primary">WanFlorist</span>
</div>
<div class="w-full max-w-md space-y-space-8">
<!-- Heading -->
<div class="mb-space-8">
<h2 class="font-headline-lg text-headline-lg text-on-background mb-space-2">Masuk ke Panel Admin</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Silakan masukkan kredensial Anda untuk melanjutkan.</p>
</div>
<!-- Form -->
<form class="space-y-space-6" onsubmit="event.preventDefault();">
<!-- Username Field -->
<div class="space-y-space-2">
<label class="block font-label-md text-label-md text-on-surface" for="username">Username</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-primary">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary">person</span>
</div>
<input class="w-full pl-12 pr-4 py-3 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 font-body-md text-body-md text-on-surface placeholder:text-outline-variant outline-none hover:border-outline shadow-sm" id="username" name="username" placeholder="Masukkan username" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-space-2">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-primary">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary">lock</span>
</div>
<input class="w-full pl-12 pr-12 py-3 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 font-body-md text-body-md text-on-surface placeholder:text-outline-variant outline-none hover:border-outline shadow-sm" id="password" name="password" placeholder="Masukkan password" required="" type="password"/>
<!-- Eye Toggle -->
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors focus:outline-none focus:text-primary" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eye-icon">visibility_off</span>
</button>
</div>
</div>
<!-- Additional Options -->
<div class="flex items-center justify-between pt-2">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded bg-surface transition-colors cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-label-md text-label-md text-on-surface-variant cursor-pointer select-none" for="remember-me">Ingat saya</label>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-full shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-primary-hover focus:outline-none focus:ring-4 focus:ring-primary/30 transition-all duration-200 active:scale-[0.98]" type="submit">
                            Masuk
                        </button>
</div>
</form>
<!-- Security Note -->
<div class="mt-8 text-center flex items-center justify-center gap-2 text-text-muted">
<span class="material-symbols-outlined text-[16px]">shield</span>
<span class="font-label-sm text-label-sm">Akses sistem diamankan dengan enkripsi</span>
</div>
</div>
</div>
</div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility';
                eyeIcon.classList.add('text-primary');
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility_off';
                eyeIcon.classList.remove('text-primary');
            }
        }
    </script>
</body></html>
